<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ModelVault — Discover Student Engineering Projects</title>
    <meta name="description" content="Browse hundreds of real engineering and IoT models built by college students. Find inspiration, component lists, costs, and everything in between." />
    <meta name="keywords" content="student projects, engineering projects, IoT, Arduino, college projects, ModelVault, engineering inspiration" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://modelvault.onspace.app" />
    <meta property="og:title" content="ModelVault — Discover Student Engineering Projects" />
    <meta property="og:description" content="Browse hundreds of real engineering and IoT models built by college students. Find inspiration, component lists, costs, and everything in between." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200&h=630&fit=crop" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="ModelVault" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ModelVault — Discover Student Engineering Projects" />
    <meta name="twitter:description" content="Browse hundreds of real engineering and IoT models built by college students." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200&h=630&fit=crop" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ModelVault",
      "url": "https://modelvault.onspace.app",
      "description": "A platform where college students upload and showcase engineering and IoT project models."
    }
    </script>
    <!-- Prevent FOUC: apply saved theme before React mounts -->
    <script>
      try {
        var t = localStorage.getItem('mv-theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
      } catch(e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
